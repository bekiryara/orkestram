name: ci-gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  gate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repo Gate
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\ci-gate.ps1
