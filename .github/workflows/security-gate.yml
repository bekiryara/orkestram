name: security-gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Security Gate
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\security-gate.ps1
