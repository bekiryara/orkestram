name: validate-gate

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gate (both apps)
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File D:\orkestram\scripts\validate.ps1 -App both
